name: Offload Monitor

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild changed reports only (1 = yes)"
        required: false
        default: "0"

      retro_enrich:
        description: "Re-fetch DEST/STD for all saved flights from AirLabs (1 = yes)"
        required: false
        default: "0"

      rebuild_all:
        description: "Rebuild ALL historical reports from saved data (1 = yes)"
        required: false
        default: "0"

      fix_old_times:
        description: "Fix UTC→MCT times in old JSON files (1 = yes) — شغّله مرة واحدة فقط"
        required: false
        default: "0"

      force_roster:
        description: "Force rebuild roster.json even if Excel unchanged (1 = yes)"
        required: false
        default: "0"

  repository_dispatch:
    types: [send_report_now]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4 pandas openpyxl

      # ─── تحديث الروستر من OneDrive ────────────────────────────────────
      # يشتغل في كل run — يتحقق داخلياً إذا تغيّر الملف قبل ما يعيد البناء
      - name: Update Roster JSON
        env:
          ONEDRIVE_ROSTER_URL: ${{ secrets.ONEDRIVE_ROSTER_URL }}
          FORCE_REBUILD: "${{ github.event.inputs.force_roster || '0' }}"
        run: python roster_to_json.py

      # ─── خطوة تصحيح الملفات القديمة ───────────────────────────────
      # شغّلها مرة واحدة فقط عبر: Actions → Run workflow → fix_old_times = 1
      # بعد التأكد من النتيجة لا تحتاج تشغّلها مرة أخرى
      - name: Fix old UTC times in JSON files
        if: ${{ github.event.inputs.fix_old_times == '1' }}
        run: python fix_times.py

      # ─── إعادة بناء التقارير بعد التصحيح ──────────────────────────
      - name: Run script
        env:
          ONEDRIVE_FILE_URL: ${{ secrets.ONEDRIVE_FILE_URL }}
          AIRLABS_API_KEY: ${{ secrets.AIRLABS_API_KEY }}
          FORCE_REBUILD: "${{ github.event.inputs.force_rebuild || '0' }}"
          RETRO_ENRICH: "${{ github.event.inputs.retro_enrich || '0' }}"
          # إذا شغّلنا fix_old_times → نعيد بناء جميع التقارير تلقائياً
          REBUILD_ALL: "${{ github.event.inputs.fix_old_times == '1' && '1' || github.event.inputs.rebuild_all || '0' }}"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          FORCE_SEND_DATE: "${{ github.event.client_payload.date_dir }}"
          FORCE_SEND_SHIFT: "${{ github.event.client_payload.shift }}"
        run: python offload_monitor.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs data roster_state.txt
          git diff --cached --quiet || git commit -m "Auto archive offload"
          git push
